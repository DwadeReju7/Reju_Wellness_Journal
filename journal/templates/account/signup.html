{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{% static 'journal/auth.css' %}">
    <meta charset="UTF-8">
    <title>Sign Up</title>
</head>
<body>
    <h1>Create Account</h1>

    <form method="post" action="{% url 'account_signup' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>

    <p>Already have an account? <a href="{% url 'account_login' %}">Sign In</a></p>
</body>
</html>
