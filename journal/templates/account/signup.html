{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Reju</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'journal/auth.css' %}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{% static 'journal/logo.png' %}" alt="Reju Logo" class="auth-logo">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start your wellness journey today</p>
            </div>

            <form method="post" action="{% url 'account_signup' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="auth-btn">Create Account</button>
            </form>

            <div class="auth-links">
                <a href="{% url 'account_login' %}">Already have an account? Sign In</a>
            </div>
        </div>

        <footer class="auth-footer">Powered by Reju</footer>
    </div>
</body>
</html>
