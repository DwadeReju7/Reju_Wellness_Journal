{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'journal/main.css' %}">
</head>
<body>
    <img src="{% static 'journal/logo.png' %}" alt="Reju Logo" class="logo">
    
    <div class="container">
        <header class="journal-header">
            <div class="date-display" id="current-date"></div>
            <h1 class="journal-title">Today's Reflection</h1>
            <nav class="breadcrumb">
                <a href="/history/">View History</a>
                <span class="separator">|</span>
                <a href="/trends/">Mood Trends</a>
            </nav>
        </header>

        <main class="journal-main">
            <div id="status" class="status-container">
                <div class="loading-spinner"></div>
                <p>Loading your journal...</p>
            </div>
        </main>
    </div>

    <footer class="footer">
        Powered by Reju
    </footer>

    <script src="{% static 'journal/today.js' %}"></script>
    <script>
        const dateEl = document.getElementById('current-date');
        const today = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateEl.textContent = today.toLocaleDateString('en-US', options);
    </script>
</body>
</html>
